# Внутренний web — статика SPA + обратный прокси на api.
# Terminate TLS не нужен — делает внешний NPM (10.10.0.61).
# См. ТЗ 4.5 и архитектуру 5.1.

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Статика SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxying (itertion 2+, пока api ещё не запущен — вернёт 502)
    location /api/ {
        proxy_pass http://api:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket upgrade
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }

    # OAuth callback — маршрутизируется в API
    location /oauth/ {
        proxy_pass http://api:8080/oauth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # LiveKit signaling WebSocket — проксируется на livekit:7880
    # (итерация 2+)
    location /rtc/ {
        proxy_pass http://livekit:7880/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }

    # Размер загружаемых файлов (аудио/видео аплоад вручную)
    client_max_body_size 50m;
}
