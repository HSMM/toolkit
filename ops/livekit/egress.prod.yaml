# LiveKit Egress prod config (используется из docker-compose.prod.yml).
# Главное отличие от dev: ws_url указывает на livekit, который в prod
# работает в network_mode: host. Имя "livekit" из docker-сети не резолвится,
# поэтому используем host.docker.internal (требует extra_hosts в compose).

redis:
  address: redis:6379

api_key: devkey
api_secret: change-me-at-least-32-chars-long-secret
ws_url: ws://host.docker.internal:7880

file_outputs:
  - path: /out

# В prod minio тоже не имеет TLS — phantom-протокол http://, поэтому:
insecure_outputs: true

logging:
  level: info
  json: true                     # машиночитаемые логи для Loki

template_port: 7980
cpu_cost:
  room_composite_cpu_cost: 3.0
  audio_room_composite_cpu_cost: 1.0
  track_composite_cpu_cost: 2.0
  track_cpu_cost: 1.0
