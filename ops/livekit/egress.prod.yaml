# LiveKit Egress prod config (используется из docker-compose.prod.yml).
# ws_url ВАЖНО — это публичный URL комнаты, который egress передаёт Chrome
# headless внутри своего контейнера, чтобы тот подключился как participant
# через WSS. Internal hostname (host.docker.internal или livekit) НЕ работает,
# потому что Chrome ходит наружу через DNS / public network.

redis:
  address: redis:6379

api_key: devkey
api_secret: change-me-at-least-32-chars-long-secret
ws_url: wss://zoom.softservice.by

file_outputs:
  - path: /out

# В prod minio тоже не имеет TLS — phantom-протокол http://, поэтому:
insecure_outputs: true

logging:
  level: debug                   # временно для диагностики «Start signal not received»
  json: true                     # машиночитаемые логи для Loki

template_port: 7980
cpu_cost:
  room_composite_cpu_cost: 3.0
  audio_room_composite_cpu_cost: 1.0
  track_composite_cpu_cost: 2.0
  track_cpu_cost: 1.0
