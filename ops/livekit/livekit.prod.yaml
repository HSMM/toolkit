# LiveKit prod config (используется из docker-compose.prod.yml при host network).

port: 7880

prometheus_port: 6789

rtc:
  tcp_port: 7881
  udp_port: 7882                # все WebRTC-сессии мультиплексированы на один UDP-порт
                                 # (стандартный prod-паттерн — проще проброс через NAT/файрвол)
  use_external_ip: true         # prod за NAT — да, чтобы STUN обнаружил публичный IP

redis:
  address: 127.0.0.1:6379        # host network — redis на том же хосте

# Webhook'и о room/participant/egress событиях шлются на api Toolkit'а.
# api проверяет HMAC через тот же LIVEKIT_API_SECRET (см. livekit.VerifyAndParseWebhook).
# Endpoint доступен публично через NPM (как и весь /api/*).
webhook:
  api_key: devkey                # должен совпадать с api_keys[].key выше / LIVEKIT_API_KEY
  urls:
    - https://toolkit.softservice.by/api/v1/livekit/webhook

logging:
  level: info
  json: true                     # машиночитаемые логи для Loki
