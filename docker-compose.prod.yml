# Production-override для app-сервера в корпоративной сети.
# Запуск: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Основные отличия от dev-стека:
# - LiveKit и coturn — в network_mode: host (нужен UDP-диапазон 50000-60000).
# - web слушает только на приватном интерфейсе app-сервера (см. APP_BIND_ADDRESS в .env)
#   через выделенный порт APP_BIND_PORT (по умолчанию 18001) — внешний reverse-proxy
#   проксирует TLS-терминацию сюда.
# - Grafana / MinIO Console / Prometheus — только на приватный IP.
# - Volumes маппятся на хост (/opt/toolkit/data/*).

services:

  postgres:
    ports: !reset []                                  # порт БД наружу не публикуем
    volumes:
      - /opt/toolkit/data/postgres:/var/lib/postgresql/data
      - ./ops/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro

  minio:
    ports: !override
      - "${APP_BIND_ADDRESS}:9000:9000"               # S3 API — только внутри сети
      - "${APP_BIND_ADDRESS}:9001:9001"               # Console — только внутри сети
    volumes:
      - /opt/toolkit/data/minio:/data

  opensearch:
    ports: !reset []
    volumes:
      - /opt/toolkit/data/opensearch:/usr/share/opensearch/data

  redis:
    ports: !override
      - "127.0.0.1:${REDIS_PORT}:6379"               # LiveKit в host network подключается к Redis через localhost

  livekit:
    network_mode: host
    networks: !reset []                               # mutually exclusive с network_mode
    ports: !reset []                                  # port publishing не нужен в host network
    command: --config /etc/livekit.yaml
    volumes:
      - ./ops/livekit/livekit.prod.yaml:/etc/livekit.yaml:ro

  livekit-egress:
    volumes:
      - ./ops/livekit/egress.yaml:/etc/egress.yaml:ro
      - /opt/toolkit/data/egress:/out

  coturn:
    network_mode: host
    networks: !reset []
    ports: !reset []
    # --external-ip должен быть публичным IP, на который DNAT'ится 3478/UDP
    # Задаётся через env COTURN_EXTERNAL_IP

  web:
    ports: !override
      - "${APP_BIND_ADDRESS}:${APP_BIND_PORT}:80"     # внешний прокси → app-сервер:18001 → контейнер:80
    extra_hosts:
      - "host.docker.internal:host-gateway"           # доступ из web к LiveKit в host network
    volumes: !override
      - ./ops/nginx/default.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - web_dist:/usr/share/nginx/html:ro

  api:
    extra_hosts:
      - "host.docker.internal:host-gateway"           # api → LiveKit Twirp (host network) через host.docker.internal:7880

  worker:
    extra_hosts:
      - "host.docker.internal:host-gateway"           # worker → LiveKit / coturn (host network)

  prometheus:
    ports: !override
      - "${APP_BIND_ADDRESS}:9090:9090"
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /opt/toolkit/data/prometheus:/prometheus

  loki:
    ports: !reset []
    volumes:
      - ./ops/loki/loki.yaml:/etc/loki/local-config.yaml:ro
      - /opt/toolkit/data/loki:/loki

  grafana:
    ports: !override
      - "${APP_BIND_ADDRESS}:3001:3000"               # доступ только через VPN или SSH-tunnel
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - /opt/toolkit/data/grafana:/var/lib/grafana
