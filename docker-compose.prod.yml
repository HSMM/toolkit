# Production-override для app-сервера 10.10.0.17 (/opt/toolkit).
# Запуск: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Основные отличия от dev-стека:
# - LiveKit и coturn в network_mode: host (нужен UDP-диапазон 50000-60000).
# - web слушает только на 10.10.0.17:18001 — NPM на 10.10.0.61 проксирует сюда.
# - Grafana и MinIO Console — только на приватный IP.
# - Volumes мапятся на хост /opt/toolkit/data/*.

services:

  postgres:
    ports: !reset []          # порт БД наружу не публикуем
    volumes:
      - /opt/toolkit/data/postgres:/var/lib/postgresql/data
      - ./ops/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro

  minio:
    ports:
      - "10.10.0.17:9000:9000"     # S3 API — только внутри сети
      - "10.10.0.17:9001:9001"     # Console — только внутри сети
    volumes:
      - /opt/toolkit/data/minio:/data

  opensearch:
    ports: !reset []
    volumes:
      - /opt/toolkit/data/opensearch:/usr/share/opensearch/data

  redis:
    ports: !reset []

  livekit:
    network_mode: host
    ports: !reset []                # port publishing не нужен в host network
    # Config override: docker-compose передаст свой livekit.yaml с правильными портами
    command: --config /etc/livekit.yaml
    volumes:
      - ./ops/livekit/livekit.prod.yaml:/etc/livekit.yaml:ro

  livekit-egress:
    volumes:
      - ./ops/livekit/egress.yaml:/etc/egress.yaml:ro
      - /opt/toolkit/data/egress:/out

  coturn:
    network_mode: host
    ports: !reset []
    # --external-ip должен быть публичным IP, на который DNAT'ится 3478/UDP
    # Задаётся через env COTURN_EXTERNAL_IP

  web:
    ports:
      - "10.10.0.17:18001:80"      # NPM 10.10.0.61 → 10.10.0.17:18001 (контейнерный nginx слушает 80)

  prometheus:
    ports:
      - "10.10.0.17:9090:9090"
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /opt/toolkit/data/prometheus:/prometheus

  loki:
    ports: !reset []
    volumes:
      - ./ops/loki/loki.yaml:/etc/loki/local-config.yaml:ro
      - /opt/toolkit/data/loki:/loki

  grafana:
    ports:
      - "10.10.0.17:3001:3000"     # доступ только через VPN или SSH-tunnel
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - /opt/toolkit/data/grafana:/var/lib/grafana
